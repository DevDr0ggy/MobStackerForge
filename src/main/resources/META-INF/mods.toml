description='''
Mob Stacker - Optimization & Loot System

Is your world lagging due to too many mob farms or dropped items? Mob Stacker is a lightweight Forge mod designed to optimize performance by grouping nearby entities while keeping the gameplay rewarding.

Key Features:
- Smart Mob Stacking: Automatically merges nearby mobs to reduce entity count.
- Age Separation: Smart logic ensures Baby mobs only stack with other Babies, and Adults with Adults.
- Loot Multiplier: Killing a stacked mob (e.g., "Pig x5") drops loot equivalent to killing 5 individual mobs.
- Item Over-Stacking: Dropped items on the ground can merge beyond the vanilla limit of 64.
- Visual & Sound Effects: Satisfying small explosion particles and "pop" sounds when entities merge.
- Custom Indicators: Beautifully formatted names with colored text (Aqua names, Gold Italic numbers).

Works out of the box for Minecraft 1.20.1 (Forge).
'''

